spring.application.name=reporting-service
server.port=8083

# Database Configuration - Connects to read replica
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/imitationgame}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# OAuth2 JWT Configuration
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_JWK_URI:http://localhost:8000/auth/jwks}
