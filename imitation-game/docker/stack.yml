version: "3.9"

services:

  auth-service:
    image: auth-service:1.0
    environment:
      DATABASE_URL: postgresql://authuser:authpass@auth-db:5432/authdb
      BOT_PASSWORD: aibot123
    networks:
      - auth-net
      - auth-db-net
      - gateway-net
      - monitoring-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure

  auth-db:
    image: postgres:15
    environment:
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass
      POSTGRES_DB: authdb
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - auth-db-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  db-master:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: main
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata-master:/var/lib/postgresql/data
    entrypoint: |
      bash -c "
      echo 'host replication all 0.0.0.0/0 trust' >> /var/lib/postgresql/data/pg_hba.conf || true;
      docker-entrypoint.sh postgres -c wal_level=replica -c max_wal_senders=3 -c max_replication_slots=3 -c hot_standby=on
      "
    networks:
      - db-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  read-replica-db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: main
      PGUSER: user
      PGPASSWORD: pass
    entrypoint: |
      bash -c "
      if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
        rm -rf /var/lib/postgresql/data/*;
        until pg_isready -h db-master -U user; do sleep 1; done;
        pg_basebackup -h db-master -U user -D /var/lib/postgresql/data -Fp -Xs -R -P;
        echo \"primary_conninfo = 'host=db-master port=5432 user=user'\" > /var/lib/postgresql/data/postgresql.auto.conf;
        touch /var/lib/postgresql/data/standby.signal;
      fi;
      docker-entrypoint.sh postgres -c hot_standby=on
      "
    volumes:
      - pgdata-replica:/var/lib/postgresql/data
    networks:
      - db-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - backend-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ai-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
    command: ["serve"]

  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "80:8000"
      - "8001:8001"
    configs:
      - source: kong-config
        target: /etc/kong/kong.yml
    networks:
      - gateway-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure

  chat-service:
    image: chat-service:1.4
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: db-master
      DB_PORT: 5432
      DB_NAME: main
      DB_USER: user
      DB_PASS: pass
      AUTH_URL: http://auth-service:8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RATE_LIMITER_URL: http://rate-limiter:8082
    networks:
      - frontend-net
      - backend-net
      - auth-net
      - db-net
      - gateway-net
      - monitoring-net
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.role == worker
        preferences:
          - spread: node.id
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  rate-limiter:
    image: rate-limiter:1.0
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - backend-net
      - auth-net
      - monitoring-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure

  reporting-service:
    image: reporting-service:1.0
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: read-replica-db
      DB_PORT: 5432
      DB_NAME: main
      DB_USER: user
      DB_PASS: pass
      AUTH_URL: http://auth-service:8000
    networks:
      - auth-net
      - db-net
      - gateway-net
      - monitoring-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure

  frontend:
    image: imitation-game-fe:1.4
    ports:
      - "3000:80"
    networks:
      - frontend-net
      - gateway-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - management-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    configs:
      - source: prometheus-config
        target: /etc/prometheus/prometheus.yml
    networks:
      - monitoring-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
    configs:
      - source: grafana-datasource
        target: /etc/grafana/provisioning/datasources/prometheus.yml
      - source: grafana-dashboard-provisioner
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
      - source: grafana-spring-dashboard
        target: /etc/grafana/dashboards/spring-boot.json
      - source: grafana-platform-dashboard
        target: /etc/grafana/dashboards/platform.json
    networks:
      - monitoring-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  adminer:
    image: adminer:latest
    ports:
      - "8086:8080"
    networks:
      - db-net
      - auth-db-net
      - management-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  ai-bot-service:
    image: ai-bot-service:1.0
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - backend-net
      - ai-net
      - monitoring-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
    depends_on:
      - chat-service
      - ollama

networks:
  gateway-net:
    driver: overlay
  frontend-net:
    driver: overlay
  backend-net:
    driver: overlay
  auth-net:
    driver: overlay
  auth-db-net:
    driver: overlay
  db-net:
    driver: overlay
  ai-net:
    driver: overlay
  management-net:
    driver: overlay
  monitoring-net:
    driver: overlay

configs:
  kong-config:
    file: ./kong/kong.yml
  prometheus-config:
    file: ./prometheus/prometheus.yml
  grafana-datasource:
    file: ./grafana/provisioning/datasources/prometheus.yml
  grafana-dashboard-provisioner:
    file: ./grafana/provisioning/dashboards/dashboards.yml
  grafana-spring-dashboard:
    file: ./grafana/dashboards/spring-boot.json
  grafana-platform-dashboard:
    file: ./grafana/dashboards/platform.json

volumes:
  auth-db-data:
  pgdata-master:
  pgdata-replica:
  ollama-data:
  portainer-data:
  grafana-data:
