version: "3.9"

services:

  auth-server:
    image: imitation-game-keycloak:1.0
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: ["start-dev", "--import-realm"]
    ports:
      - "8085:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  db-master:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: main
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata-master:/var/lib/postgresql/data
    entrypoint: |
      bash -c "
      echo 'host replication all 0.0.0.0/0 trust' >> /var/lib/postgresql/data/pg_hba.conf || true;
      docker-entrypoint.sh postgres -c wal_level=replica -c max_wal_senders=3 -c max_replication_slots=3 -c hot_standby=on
      "
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  read-replica-db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: main
      PGUSER: user
      PGPASSWORD: pass
    entrypoint: |
      bash -c "
      if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
        rm -rf /var/lib/postgresql/data/*;
        until pg_isready -h db-master -U user; do sleep 1; done;
        pg_basebackup -h db-master -U user -D /var/lib/postgresql/data -Fp -Xs -R -P;
        echo \"primary_conninfo = 'host=db-master port=5432 user=user'\" > /var/lib/postgresql/data/postgresql.auto.conf;
        touch /var/lib/postgresql/data/standby.signal;
      fi;
      docker-entrypoint.sh postgres -c hot_standby=on
      "
    volumes:
      - pgdata-replica:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    command: ["serve"]

  chat-service:
    image: chat-service:1.0
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: db-master
      DB_PORT: 5432
      DB_NAME: main
      DB_USER: user
      DB_PASS: pass
      KEYCLOAK_URL: http://auth-server:8080
      KEYCLOAK_PUBLIC_URL: http://auth-server:8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RATE_LIMITER_URL: http://rate-limiter:8082
    networks:
      - backend
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  rate-limiter:
    image: rate-limiter:1.0
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  reporting-service:
    image: reporting-service:1.0
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: read-replica-db
      DB_PORT: 5432
      DB_NAME: main
      DB_USER: user
      DB_PASS: pass
      KEYCLOAK_URL: http://auth-server:8080
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  frontend:
    image: imitation-game-fe:1.0
    ports:
      - "3000:80"
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  ai-bot-service:
    image: ai-bot-service:1.0
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    depends_on:
      - chat-service
      - ollama

networks:
  backend:
    driver: overlay

volumes:
  keycloak-data:
  pgdata-master:
  pgdata-replica:
  ollama-data:
