global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: chat-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['chat-service:8080']

  - job_name: rate-limiter
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['rate-limiter:8082']

  - job_name: reporting-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['reporting-service:8083']

  - job_name: ai-bot-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['ai-bot-service:8084']

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ['auth-service:8000']

  - job_name: kong
    metrics_path: /metrics
    static_configs:
      - targets: ['kong:8001']
