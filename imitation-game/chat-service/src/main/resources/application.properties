spring.application.name=chat-service

# JPA Configuration
spring.jpa.open-in-view=false

# OAuth2 Resource Server
# Default to localhost:8085 for local dev; override KEYCLOAK_URL env var in Docker
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/imitation-game

# Rate Limiter Configuration
rate-limiter.url=${RATE_LIMITER_URL:http://localhost:8082}
