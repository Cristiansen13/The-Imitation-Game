spring.application.name=chat-service

# JPA Configuration
spring.jpa.open-in-view=false

# OAuth2 Resource Server
# Default to localhost:8000 for local dev; override AUTH_URL env var in Docker
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_URL:http://localhost:8000}/auth/jwks

# Rate Limiter Configuration
rate-limiter.url=${RATE_LIMITER_URL:http://localhost:8082}
