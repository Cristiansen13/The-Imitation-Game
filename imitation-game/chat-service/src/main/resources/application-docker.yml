server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_URL}/realms/imitation-game/protocol/openid-connect/certs
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

keycloak:
  public-issuer: ${KEYCLOAK_PUBLIC_URL:http://localhost:8085}/realms/imitation-game

rate-limiter:
  url: ${RATE_LIMITER_URL:http://rate-limiter:8082}
