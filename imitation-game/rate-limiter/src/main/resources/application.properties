spring.application.name=rate-limiter
server.port=8082

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# OAuth2 JWT Configuration
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_URI:http://localhost:8085/realms/imitation-game/protocol/openid-connect/certs}

# Rate Limiter Configuration
rate-limiter.requests-per-minute=${RATE_LIMIT_REQUESTS:60}
rate-limiter.window-size-seconds=${RATE_LIMIT_WINDOW:60}
