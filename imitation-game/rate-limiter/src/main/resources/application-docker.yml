spring:
  application:
    name: rate-limiter
  data:
    redis:
      host: redis
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-service:8000/auth/jwks

server:
  port: 8082

rate-limiter:
  requests-per-minute: 60
  window-size-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: rate-limiter
