name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: chat-service
            context: imitation-game/chat-service
          - service: rate-limiter
            context: imitation-game/rate-limiter
          - service: reporting-service
            context: imitation-game/reporting-service
          - service: ai-bot-service
            context: imitation-game/ai-bot-service
          - service: auth-service
            context: imitation-game/auth-service
          - service: imitation-game-fe
            context: imitation-game-fe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Lowercase Repository Name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}
        
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H ${{ secrets.SWARM_MANAGER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
      
      - name: Deploy to Docker Swarm
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SWARM_MANAGER_SSH_KEY }}
          SWARM_USER: ${{ secrets.SWARM_MANAGER_USER }}
          SWARM_HOST: ${{ secrets.SWARM_MANAGER_HOST }}
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          
          ssh -i /tmp/ssh_key $SWARM_USER@$SWARM_HOST "
            docker login -u $REGISTRY_USERNAME -p $REGISTRY_PASSWORD ${{ env.REGISTRY }} &&
            docker stack deploy \
              --with-registry-auth \
              -c /opt/imitation-game/stack.yml \
              imitation-game
          "
          
          rm /tmp/ssh_key